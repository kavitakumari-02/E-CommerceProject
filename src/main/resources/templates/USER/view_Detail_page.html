<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Product Details</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f8f9fa;
    }
    .product-img {
        width: 100%;
        border-radius: 10px;
    }
    .price {
        font-size: 28px;
        font-weight: bold;
        color: #28a745;
    }
    .old-price {
        text-decoration: line-through;
        color: gray;
    }
    .rating i {
        color: #ffc107;
    }
    .btn-custom {
        width: 48%;
    }
</style>
</head>

<body>

<div class="container mt-5">
    <div class="row">

        <!-- Product Image -->
        <div class="col-md-5">
            <img src="https://via.placeholder.com/500" class="product-img" alt="Product Image">
        </div>

        <!-- Product Details -->
        <div class="col-md-7">
            <h2>Product Name</h2>

            <!-- Rating -->
            <div class="rating mb-2">
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star-half-alt"></i>
                <span>(120 reviews)</span>
            </div>

            <!-- Price -->
            <p>
                <span class="price">₹999</span>
                <span class="old-price ms-2">₹1499</span>
            </p>

            <!-- Description -->
            <p>
                This is a high-quality product with amazing features. Perfect for daily use and long-lasting durability.
            </p>

            <!-- Quantity -->
            <div class="mb-3">
                <label>Quantity:</label>
                <input type="number" value="1" min="1" class="form-control w-25">
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between">
                <button class="btn btn-warning btn-custom">
                    <i class="fa fa-shopping-cart"></i> Add to Cart
                </button>

                <button class="btn btn-success btn-custom">
                    <i class="fa fa-bolt"></i> Buy Now
                </button>
            </div>

            <!-- Extra Info -->
            <div class="mt-4">
                <p><strong>Category:</strong> Electronics</p>
                <p><strong>Availability:</strong> In Stock</p>
            </div>

        </div>
    </div>

   
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
