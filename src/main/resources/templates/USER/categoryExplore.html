<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="USER/basenavbar :: layout(~{::section})">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category Products</title>

<section>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* PAGE TITLE */
.category-title {
  text-align: center;
  margin: 30px 0;
  font-weight: 600;
}

/* PRODUCT CARD */
.product-card {
  border-radius: 10px;
  background: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.product-card:hover {
  transform: translateY(-5px);
}

.price {
  color: green;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

  <!-- CATEGORY NAME -->
  <h3 class="category-title" th:text="${categoryName}">Category</h3>

  <!-- PRODUCTS -->
  <div class="row g-4">

    <div class="col-md-3" th:each="item : ${products}">
      <div class="product-card p-3 text-center">

        <img th:src="@{'/image/' + ${item.image}}" class="img-fluid mb-2" height="200">

        <h5 th:text="${item.productName}"></h5>
        <p th:text="${item.description}"></p>

        <h5 class="price" th:text="'₹' + ${item.price}"></h5>

        <a th:href="@{'/user/view-details/' + ${item.id}}" 
           class="btn btn-success btn-sm mt-2">
           View Details
        </a>

      </div>
    </div>

  </div>

</div>

</section>
</body>
</html>
