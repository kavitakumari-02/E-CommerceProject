<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="USER/basenavbar :: layout(~{::section})">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<section>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BACKGROUND */
body {
  background: #eef1f5;
}

/* SIDEBAR */
.category-sidebar {
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* CATEGORY ITEMS */
.category-sidebar .list-group-item {
  border: 1px solid #ddd;
  margin-bottom: 6px;
  border-radius: 6px;
  font-size: 20px;
}

.category-sidebar .active {
  background: #0d6efd;
  color: #fff;
}

/* PRODUCT CARD */
.product-card {
  background: #fff;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  border: 1px solid #ddd;
  transition: 0.3s;
}

.product-card:hover {
  transform: translateY(-5px);
}

/* IMAGE */
.product-img {
  height: 150px;
  object-fit: contain;
}

/* PRICE */
.price {
  font-weight: bold;
}

/* TITLE */
.page-title {
  text-align: center;
  margin-bottom: 20px;
}

</style>
</head>

<body>

<div class="container-fluid mt-4">

  <div class="row">

    <!-- ✅ LEFT CATEGORY -->
    <div class="col-md-2">
      <div class="category-sidebar">

        <h5 class="text-center">Categories</h5>

        <div class="list-group">

          <!-- CATEGORY LIST ONLY (NO NEED TO CLICK ALL) -->
          <a th:each="cat : ${allCategory}"
             th:href="@{'/user/explore-category/' + ${cat.category}}"
             th:text="${cat.category}"
             class="list-group-item">
			 <p th:text="${cat.category}"></p>
          </a>

        </div>

      </div>
    </div>

    <!-- ✅ RIGHT PRODUCTS -->
    <div class="col-md-10">

      <h4 class="page-title">All Products</h4>

      <div class="row g-4">

        <div class="col-md-3" th:each="item : ${categoryItems}">
          
          <div class="product-card">

            <img th:src="@{'/image/' + ${item.image}}" class="w-100 product-img">

            <h6 th:text="${item.productName}"></h6>

            <div class="price" th:text="'₹ ' + ${item.price}"></div>

            <a th:href="@{'/user/view-details/' + ${item.id}}" 
               class="btn btn-primary btn-sm mt-2">
               View Details
            </a>

          </div>

        </div>

      </div>

      <!-- EMPTY -->
      <div class="text-center mt-5"
           th:if="${categoryItems == null or categoryItems.isEmpty()}">
        <h5>No products found 😔</h5>
      </div>

    </div>

  </div>

</div>

</section>
</body>
</html>
