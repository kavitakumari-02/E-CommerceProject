<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="ADMIN/adminNavbar.html :: layout(~{::section})">
<head>
	<section>
<meta charset="UTF-8">
<title>E-commerce Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.main {
    display: flex;
    height: 100vh;
}

/* Left */
.left {
    flex: 1;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 50px;
}

/* Right */
.right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form-box {
    background: white;
    padding: 35px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

.form-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* Inputs */
.form-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
}

/* Button */
.form-box button {
    width: 100%;
    padding: 10px;
    background: #4facfe;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

.form-box button:hover {
     background: #007bff;
}

/* Forgot Password */
.forgot {
    text-align: right;
    margin-bottom: 10px;
}

.forgot a {
    font-size: 13px;
    color: #007bff;
    text-decoration: none;
}

.forgot a:hover {
    text-decoration: underline;
}

/* Bottom link */
.login {
    text-align: center;
    margin-top: 15px;
}

.login a {
    color: #007bff;
    text-decoration: none;
}

/* 🔥 CSS Modal (No JS) */
#toggle {
    display: none;
}

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
}

/* Show modal when checkbox checked */
#toggle:checked ~ .modal {
    display: flex;
}

.modal-box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

.modal-box input {
    width: 100%;
    margin: 10px 0;
}

.close {
    display: inline-block;
    margin-top: 10px;
    background: red;
    color: white;
    padding: 8px 15px;
    border-radius: 5px;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="main">

    <!-- Left -->
    <div class="left">
        <h1>Welcome Back 🛍️</h1>
        <h3>Login to continue shopping amazing products.</h3>
    </div>

    <!-- Right -->
    <div class="right">
        <div class="form-box">

            <h2>Login</h2>

            <form th:action="@{/do_login}" method="post">
                <input type="email" name="email" placeholder="Email">
                <input type="password" name="password" placeholder="Password">

                <!-- ✅ Forgot Password Trigger -->
                <div class="forgot">
                    <label for="toggle" style="cursor:pointer; color:#007bff;">
                        Forgot Password?
                    </label>
                </div>

                <button type="submit">Login</button>
            </form>

            <div class="login">
                Don't have an account? <a href="/register">Register</a>
            </div>

        </div>
    </div>

</div>

<!-- Hidden Checkbox -->
<input type="checkbox" id="toggle">

<!-- ✅ Modal -->
<div class="modal">
    <div class="modal-box">
        <h3>Reset Password</h3>
        <input type="email" placeholder="Enter your email">
        <button style="background:#4CAF50;">Send Reset Link</button>
        <br>
        <label for="toggle" class="close">Close</label>
    </div>
</div>
</section>
</body>
</html>
