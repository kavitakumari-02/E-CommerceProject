<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="ADMIN/adminNavbar :: layout(~{::section})">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Update Category</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<section>
<div class="container mt-5">
    <div class="card shadow-lg p-4">

        <h3 class="text-center mb-4 text-primary">Update Category</h3>

        <form th:action="@{/admin/category-update-handler}" th:object="${product}" method="post" enctype="multipart/form-data">

            <!-- Hidden ID -->
            <input type="hidden" th:field="*{id}">

            <!-- Category Name -->
            <div class="mb-3">
                <label class="form-label fw-bold">Category Name</label>
                <input type="text" class="form-control" placeholder="Enter category name" th:field="*{category}" required>
            </div>
			<div class="mb-3">
			       <label class="form-label fw-bold">Product Name</label>
			       <input type="text" class="form-control" placeholder="Enter product name" th:field="*{productName}" required>
			            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label fw-bold">Description</label>
                <textarea class="form-control" rows="3" placeholder="Enter description" th:field="*{description}"></textarea>
            </div>

            <!-- Current Image -->
            <div class="mb-3 text-center">
                <label class="form-label fw-bold d-block">Current Image</label>
                <img src="https://via.placeholder.com/120"
                     class="rounded border"
                     style="width:120px; height:120px; object-fit:cover;">
            </div>

            <!-- Upload New Image -->
            <div class="mb-3">
                <label class="form-label fw-bold">Change Image</label>
                <input type="file" class="form-control">
            </div>

            <!-- Status -->
            <div class="mb-4">
                <label class="form-label fw-bold">Status</label>
                <select class="form-control"
				th:field="*{active}">
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
					</select>
            </div>

            <!-- Buttons -->
            <div class="text-center">
                <button type="submit" class="btn btn-success px-4">Update</button>
                <button type="reset" class="btn btn-secondary px-4">Reset</button>
            </div>

        </form>

    </div>
</div>
</section>
</body>
</html>
