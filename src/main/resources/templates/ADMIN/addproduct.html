<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="ADMIN/adminNavbar :: layout(~{::section})">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Product</title>
<section>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}

/* Card Style */
.form-card {
    border-radius: 15px;
}

/* Header */
.page-header {
    background: white;
    padding: 15px 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container mt-4">

    <!-- Header -->
    <div class="page-header shadow-sm d-flex justify-content-between align-items-center">
        <h4 class="mb-0"><i class="fa fa-plus-circle text-primary"></i> Add Product</h4>
        <a href="#" class="btn btn-dark btn-sm">Back</a>
    </div>

    <!-- Form -->
    <div class="card form-card shadow-sm mt-4 p-4">

        <form th:action="@{/admin/product-add-handler}" 
		th:object="${addProduct}"
		 method="post" 
		 enctype="multipart/form-data">
          <div class="row">
			
           <!-- Product Name -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text"
					th:field="*{productName}" 
					class="form-control" 
					placeholder="Enter product name"></div>
					
             <!-- Price -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Price (₹)</label>
                    <input type="number"
					th:field="*{price}" 
					class="form-control" 
					placeholder="Enter price"></div>
					
					 <!-- Category -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Category</label>
                    <select class="form-control" th:field="*{category}">
                        <option value="">Select Category</option>
						<option th:each="cat : ${category}"
						th:value="${cat.category}"
						th:text="${cat.category}">
					</option>
						
                    </select> </div>
					
					 <!-- Quantity -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Stock Quantity</label>
                    <input type="number"
					th:field="*{quantity}" 
					class="form-control" 
					placeholder="Enter quantity"></div> 
				<!-- Image -->
                <div class="col-md-12 mb-3">
                    <label class="form-label">Product Image</label>
                    <input type="file"
					th:field="*{image}" 
					class="form-control">
                </div>

                <!-- Description -->
                <div class="col-md-12 mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control"
					th:field="*{description}"
					 rows="4" 
					 placeholder="Enter product description"></textarea>
                </div>

            </div>

            <!-- Buttons -->
            <div class="text-end mt-3">
                <button type="reset" class="btn btn-secondary">Reset</button>
                <button type="submit" class="btn btn-success">
                    <i class="fa fa-save"></i> Add Product
                </button>
            </div>

        </form>

    </div>

</div>
</section>
</body>
</html>
