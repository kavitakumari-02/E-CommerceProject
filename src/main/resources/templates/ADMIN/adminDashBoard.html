<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="ADMIN/adminNavbar :: layout(~{::section})">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Dashboard</title>
<section>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}

/* Topbar */
.topbar {
    background: white;
    padding: 15px 20px;
    border-radius: 10px;
}

/* Card Box */
.dashboard-box {
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    background: white;
    transition: 0.3s;
    cursor: pointer;
}

.dashboard-box:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* Icons */
.icon-box {
    font-size: 35px;
    margin-bottom: 10px;
}

/* Colors */
.bg1 { color: #0d6efd; }
.bg2 { color: #198754; }
.bg3 { color: #ffc107; }
.bg4 { color: #dc3545; }
.bg5 { color: #6f42c1; }
.bg6 { color: #20c997; }

</style>
</head>

<body>

<div class="container mt-4">

    <!-- Topbar -->
    <div class="topbar shadow-sm d-flex justify-content-between">
        <h4 class="mb-0">Admin Dashboard</h4>
        <i class="fa fa-user-circle fa-2x"></i>
    </div>

    <!-- Dashboard Boxes -->
    <div class="row mt-4 g-4">

        <!-- Add Product -->
		<div class="col-md-4">
		    <a th:href="@{/admin/add-product}" style="text-decoration: none; color: inherit;">
		        <div class="dashboard-box shadow-sm">
		            <div class="icon-box bg1">
		                <i class="fa fa-plus-circle"></i>
		            </div>
		            <h5>Add Product</h5>
		        </div>
		    </a>
		</div>

        <!-- Add Category -->
        <div class="col-md-4">
			<a th:href="@{/admin/add-category-handler}" style="text-decoration: none; color: inherit;">
            <div class="dashboard-box shadow-sm">
                <div class="icon-box bg2">
                    <i class="fa fa-layer-group"></i>
                </div>
                <h5>Add Category</h5>
            </div>
			</a>
        </div>

        <!-- View Products -->
        <div class="col-md-4">
			<a th:href="@{/admin/viewProduct}" style="text-decoration: none; color: inherit;">
            <div class="dashboard-box shadow-sm">
                <div class="icon-box bg3">
                    <i class="fa fa-eye"></i>
                </div>
                <h5>View Products</h5>
            </div>
			</a>
        </div>

        <!-- Orders -->
        <div class="col-md-4">
            <div class="dashboard-box shadow-sm">
                <div class="icon-box bg4">
                    <i class="fa fa-shopping-cart"></i>
                </div>
                <h5>Orders</h5>
            </div>
        </div>

        <!-- Users -->
        <div class="col-md-4">
            <div class="dashboard-box shadow-sm">
                <div class="icon-box bg5">
                    <i class="fa fa-users"></i>
                </div>
                <h5>Users</h5>
            </div>
        </div>

        <!-- Add Admin -->
        <div class="col-md-4">
            <div class="dashboard-box shadow-sm">
                <div class="icon-box bg6">
                    <i class="fa fa-user-shield"></i>
                </div>
                <h5>Add Admin</h5>
            </div>
        </div>

    </div>

</div>
</section>
</body>
</html>
