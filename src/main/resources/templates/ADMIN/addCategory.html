<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="ADMIN/adminNavbar :: layout(~{::section})">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Category Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body { background: #f4f6f9; }
.card-box { border-radius: 15px; }
</style>
</head>

<body>
<section>

<div class="container mt-4">

<h4><i class="fa fa-layer-group text-success"></i> Category Management</h4>

<div class="row mt-3">

<!-- ADD FORM -->
<div class="col-md-4">
<div class="card card-box shadow-sm p-3">

<h5>Add Category</h5>

<form th:action="@{/admin/add-category-handler}" 
      method="post" 
      enctype="multipart/form-data">

    <!-- Category Name -->
    <input type="text" name="category" class="form-control mb-2" placeholder="Category Name" required>

    <!-- Product Name -->
    <input type="text" name="productName" class="form-control mb-2" placeholder="Product Name">

    <!-- Image -->
    <input type="file" name="fileImage" class="form-control mb-2">

    <!-- Is Active -->
    <div class="mb-2">
        <label><b>Status:</b></label><br>
        <input type="radio" name="isActive" value="true"> Active
        <input type="radio" name="isActive" value="false" checked> Inactive
    </div>

    <!-- Description -->
    <textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>

    <button class="btn btn-success w-100">
        <i class="fa fa-plus"></i> Add
    </button>

</form>

</div>
</div>

<!-- TABLE -->
<div class="col-md-8">
<div class="card card-box shadow-sm p-3">

<h5>All Categories</h5>

<table class="table table-bordered mt-3">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Category</th>
<th>Product</th>
<th>Image</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>
<tr th:each="product : ${allProduct}">
<td th:text="${product.id}"></td>
<td th:text="${product.category}"></td>
<td th:text="${product.productName}"></td>

<td>
<img th:src="@{'/image/' + ${product.fileImage}}" width="50">
</td>

<td>
<span th:text="${product.isActive} ? 'Active' : 'Inactive'"
      th:classappend="${product.isActive} ? 'text-success' : 'text-danger'">
</span>
</td>

<td>
<a th:href="@{'/admin/update-category/' + ${product.id}}" class="btn btn-sm btn-primary">Edit</a>
<a th:href="@{'/admin/delete-category/' + ${product.id}}"
   class="btn btn-sm btn-danger"
   onclick="return confirm('Are you sure you want to delete this category?')">
   Delete
</a>
</td>

</tr>
</tbody>

</table>

</div>
</div>

</div>

</div>

</section>
</body>
</html>
